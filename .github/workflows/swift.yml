name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Agent preflight
      run: ./scripts/agent-preflight.sh
    - name: Build BeanBook
      run: xcodebuild -project BeanBook.xcodeproj -scheme BeanBook -destination 'generic/platform=iOS Simulator' build

  build-functions:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: npm
        cache-dependency-path: functions/package-lock.json
    - name: Install functions dependencies
      run: npm ci
      working-directory: functions
    - name: Build functions
      run: npm run build
      working-directory: functions
